name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            platform: darwin-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          path: probe-aeneas

      - uses: actions/checkout@v4
        with:
          repository: Beneficial-AI-Foundation/probe
          path: probe

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        working-directory: probe-aeneas
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Run tests (native only)
        if: ${{ !matrix.cross }}
        working-directory: probe-aeneas
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package binary
        working-directory: probe-aeneas
        run: |
          TAG="${{ github.ref_name }}"
          ARTIFACT="probe-aeneas-${TAG}-${{ matrix.platform }}"
          mkdir -p "${ARTIFACT}/bin"
          cp "target/${{ matrix.target }}/release/probe-aeneas" "${ARTIFACT}/bin/"
          tar -czf "${ARTIFACT}.tar.gz" -C "${ARTIFACT}" bin
          echo "ARTIFACT=${ARTIFACT}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-aeneas-${{ matrix.platform }}
          path: probe-aeneas/${{ env.ARTIFACT }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz
